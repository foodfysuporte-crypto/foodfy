<!DOCTYPE html> <html lang='pt-br' class='h-full bg-slate-950'> <head> <meta charset='UTF-8'> <title>Master Admin | Foodfy Modern</title> <script src='https://cdn.tailwindcss.com'></script> <script defer src='https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js'></script> <script src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2'></script> </head> <body class='h-full bg-slate-950 text-white' x-data='masterDashboard' x-init='init()'> <header class='p-8 border-b border-slate-800 flex justify-between items-center'> <h1 class='text-2xl font-black text-purple-500 italic'>MASTER PANEL</h1> <button @click='window.auth.signOut()' class='px-4 py-2 bg-slate-800 rounded-xl'>Sair</button> </header> <main class='p-12 max-w-7xl mx-auto space-y-8'> <div class='flex justify-between items-center mb-8'> <h2 class='text-3xl font-bold'>Restaurantes</h2> <button @click='showModal = true' class='bg-purple-600 px-6 py-2 rounded-xl font-bold'>+ Novo</button> </div> <div class='grid grid-cols-1 md:grid-cols-3 gap-6'> <template x-for='org in organizations' :key='org.id'> <div class='bg-slate-900 p-8 rounded-3xl flex justify-between items-center'> <div> <p class='text-xl font-bold' x-text='org.name'></p> <p class='text-xs text-slate-500' x-text='org.slug'></p> </div> <button @click='toggleStatus(org)' :class='org.is_active ? " text-green-500\ : \text-red-500\' class='font-black text-xs' x-text='org.is_active ? \ATIVO\ : \BLOQUEADO\'></button> </div> </template> </div> </main> <script src='../js/app.js'></script> <script src='../js/auth.js'></script> <script src='../js/master.js'></script> <script> document.addEventListener('alpine:init', () => { Alpine.data('masterDashboard', () => ({ organizations: [], showModal: false, form: { name: '', slug: '' }, async init() { const session = await window.auth.session(); if (!session || session.profile?.role !== 'super_admin') { window.location.href = '../index.html'; return; } await this.load(); }, async load() { this.organizations = await window.master.listOrganizations(); }, async toggleStatus(org) { await window.master.toggleOrganizationStatus(org.id, org.is_active); await this.load(); }, async create() { await window.master.createOrganization(this.form.name, this.form.slug); this.showModal = false; await this.load(); } })) }) </script> </body> </html>
