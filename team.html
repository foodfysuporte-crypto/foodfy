<!DOCTYPE html>
<html lang="pt-br" class="h-full bg-slate-950 font-sans">
<head>
    <meta charset="UTF-8">
    <title>Foodfy Modern | Equipe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <style>[x-cloak] { display: none !important; }</style>
</head>
<body class="h-full flex text-white bg-slate-950" x-data="teamPage" x-init="init()">
    
    <aside class="w-20 md:w-64 bg-slate-900 border-r border-slate-800 flex flex-col items-center md:items-start py-8 space-y-8 z-10 transition-all">
        <div class="px-0 md:px-8 flex items-center justify-center md:justify-start w-full">
            <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-purple-600 to-pink-600 flex items-center justify-center font-black italic text-xl shadow-lg">F</div>
            <span class="ml-4 font-black text-xl hidden md:block tracking-widest bg-clip-text text-transparent bg-gradient-to-r from-purple-400 to-pink-400">Foodfy</span>
        </div>
        <nav class="flex-1 w-full px-4 space-y-2">
            <a href="dashboard.html" class="flex items-center px-4 py-3 rounded-xl hover:bg-slate-800 text-slate-400 font-bold transition-all group">
                <span class="text-xl">📊</span><span class="ml-4 hidden md:block group-hover:text-white">Dashboard</span>
            </a>
            <a href="products.html" class="flex items-center px-4 py-3 rounded-xl hover:bg-slate-800 text-slate-400 font-bold transition-all group">
                <span class="text-xl">🍔</span><span class="ml-4 hidden md:block group-hover:text-white">Cardápio</span>
            </a>
            <a href="team.html" class="flex items-center px-4 py-3 rounded-xl bg-purple-600/10 text-purple-400 font-bold transition-all border border-purple-500/20">
                <span class="text-xl">👥</span><span class="ml-4 hidden md:block text-white">Equipe</span>
            </a>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col h-full overflow-hidden">
        <header class="p-8 border-b border-slate-800 flex flex-col sm:flex-row justify-between items-start sm:items-center bg-slate-900/30">
            <div>
                <h1 class="text-3xl font-black italic text-white flex items-center gap-3">Gestão de Equipe</h1>
                <p class="text-slate-500 font-bold text-sm mt-1 uppercase tracking-widest">Crie senhas para seus funcionários</p>
            </div>
            
            <div class="mt-4 sm:mt-0 flex flex-col items-end">
                <span class="text-xs text-slate-500 uppercase tracking-widest font-black mb-1">CÓDIGO DE CONVITE DA LOJA</span>
                <div class="bg-slate-900 border border-slate-700 px-6 py-3 rounded-2xl flex items-center gap-4">
                    <span class="text-2xl font-black tracking-[0.2em] text-purple-400" x-text="inviteCode"></span>
                    <button @click="copyCode" class="text-slate-500 hover:text-white transition-colors" title="Copiar">📋</button>
                </div>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-8">
            <div class="max-w-5xl mx-auto space-y-8">
                
                <!-- Criar Novo Funcionario -->
                <div class="bg-slate-900 border border-slate-800 p-6 rounded-3xl">
                    <h2 class="text-lg font-black mb-4 flex items-center gap-2 text-blue-400"><span>+</span> Novo Funcionário</h2>
                    <form @submit.prevent="createStaff" class="flex flex-col md:flex-row gap-4 items-end">
                        <div class="flex-1 flex flex-col">
                            <label class="text-[10px] font-black uppercase text-slate-500 tracking-widest mb-1">Nome (Apelido)</label>
                            <input type="text" x-model="newStaff.name" required placeholder="joao" class="bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-white font-bold outline-none focus:border-blue-500 lowercase">
                        </div>
                        <div class="flex-1 flex flex-col">
                            <label class="text-[10px] font-black uppercase text-slate-500 tracking-widest mb-1">PIN (Senha)</label>
                            <input type="password" x-model="newStaff.pin" required placeholder="1234" class="bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-white font-bold outline-none focus:border-blue-500 tracking-[0.2em]">
                        </div>
                        <div class="flex-1 flex flex-col">
                            <label class="text-[10px] font-black uppercase text-slate-500 tracking-widest mb-1">Cargo</label>
                            <select x-model="newStaff.role" class="bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-white font-bold outline-none focus:border-blue-500 appearance-none">
                                <option value="caixa">Caixa</option>
                                <option value="garcom">Garçom</option>
                                <option value="motoboy">Motoboy</option>
                            </select>
                        </div>
                        <button type="submit" :disabled="isCreating" class="bg-blue-600 hover:bg-blue-500 disabled:opacity-50 text-white font-black px-6 py-3 rounded-xl transition-all shadow-lg select-none whitespace-nowrap">
                            <span x-text="isCreating ? 'Criando...' : 'Criar Acesso'"></span>
                        </button>
                    </form>
                    <p class="text-[10px] text-slate-500 font-bold mt-3 uppercase tracking-widest">Acesse <span class="text-blue-400">/staff.html</span> com esses dados para testar</p>
                </div>

                <!-- Lista -->
                <div class="bg-slate-900 rounded-3xl border border-slate-800 overflow-hidden shadow-2xl">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="border-b border-slate-800 bg-slate-900/50">
                                <th class="p-5 text-xs font-black text-slate-500 uppercase tracking-widest">App ID / Funcionário</th>
                                <th class="p-5 text-xs font-black text-slate-500 uppercase tracking-widest">Acesso de Sistema</th>
                            </tr>
                        </thead>
                        <tbody>
                            <template x-for="user in team" :key="user.id">
                                <tr class="border-b border-slate-800/50 hover:bg-slate-800/20 transition-colors">
                                    <td class="p-5">
                                        <div class="font-bold text-white uppercase" x-text="user.name"></div>
                                        <div class="text-[10px] text-slate-500 uppercase font-bold" x-text="user.id"></div>
                                    </td>
                                    <td class="p-5">
                                        <div x-show="user.role !== 'admin'" class="flex items-center gap-2">
                                            <span class="px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest bg-blue-500/20 text-blue-400 border border-blue-500/30" x-text="user.role"></span>
                                            
                                            <!-- Mudar Cargo Rápido -->
                                            <select @change="updateRole(user, $event.target.value)" class="bg-slate-950/50 border border-slate-700/50 rounded-lg px-2 py-1 text-xs font-bold text-slate-400 outline-none hover:text-white cursor-pointer -ml-1">
                                                <option value="" disabled selected>Alterar...</option>
                                                <option value="caixa">Virar: Caixa</option>
                                                <option value="garcom">Virar: Garçom</option>
                                                <option value="motoboy">Virar: Motoboy</option>
                                                <option value="pendente">Bloquear</option>
                                            </select>
                                        </div>
                                        <span x-show="user.role === 'admin'" class="text-[10px] font-black text-red-400 uppercase tracking-widest border border-red-500/20 px-2 py-1 rounded bg-red-500/10">DONO</span>
                                    </td>
                                </tr>
                            </template>
                            <tr x-show="team.length === 0" x-cloak>
                                <td colspan="2" class="p-10 text-center text-slate-500 font-bold uppercase tracking-widest">Nenhuma equipe cadastrada</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('teamPage', () => ({
                team: [], inviteCode: 'CARREGANDO...', orgId: null, isCreating: false,
                newStaff: { name: '', pin: '', role: 'garcom' },
                
                async init() {
                    const session = await window.auth.session();
                    if (!session || session.profile.role !== 'admin') return window.location.href = 'index.html';
                    
                    this.orgId = session.profile.org_id;
                    await this.loadOrg();
                    await this.loadTeam();
                },

                async loadOrg() {
                    const { data } = await window.supabaseClient.from('organizations').select('invite_code').eq('id', this.orgId).single();
                    if(data) this.inviteCode = data.invite_code;
                },

                async loadTeam() {
                    // Nós buscamos todos os perfis. Como não temos a coluna nome real, vamos tentar deduzir pelas contas falsas ou só mostrar Func.
                    const { data } = await window.supabaseClient.from('profiles').select('id, role').eq('org_id', this.orgId).order('created_at', { ascending: true });
                    if (!data) return;
                    this.team = data.map(p => ({
                        id: p.id.slice(0,8),
                        realId: p.id,
                        role: p.role,
                        name: p.role === 'admin' ? 'DONO RESTAURANTE' : 'FUNC. ' + p.id.slice(0,4)
                    }));
                },

                async createStaff() {
                    this.isCreating = true;
                    try {
                        const cleanCode = this.inviteCode.trim().toLowerCase().replace(/[^a-z0-9]/g, '');
                        const cleanUser = this.newStaff.name.trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-z0-9]/g,'');
                        const vEmail = `${cleanUser}@${cleanCode}.staff.com`;
                        const vPass = `pin-${this.newStaff.pin}-${this.inviteCode.trim().toUpperCase()}`;

                        // Criamos um client SECUNDÁRIO que não rouba a sessão atual do dono!!!
                        const supabaseUrl = window.supabaseClient.supabaseUrl;
                        const supabaseKey = window.supabaseClient.supabaseKey;
                        const isolateClient = supabase.createClient(supabaseUrl, supabaseKey, {
                            auth: { persistSession: false, autoRefreshToken: false, detectSessionInUrl: false }
                        });

                        const { data, error } = await isolateClient.auth.signUp({ email: vEmail, password: vPass });
                        if (error) throw error;

                        // Espera gatilho de perfil nascer (1 seg)
                        await new Promise(r => setTimeout(r, 1000));

                        // O Dono ATUALIZA o perfil para dar o cargo, porque o dono tem RLS pra isso!
                        await window.supabaseClient.from('profiles').update({ org_id: this.orgId, role: this.newStaff.role }).eq('id', data.user.id);
                        
                        alert(`Acesso criado! O(A) ${cleanUser.toUpperCase()} já pode entrar pelo /staff.html usando o Código e Senha.`);
                        this.newStaff = { name: '', pin: '', role: 'garcom' };
                        await this.loadTeam();
                    } catch(e) {
                        alert("Erro ao criar: " + e.message);
                    } finally {
                        this.isCreating = false;
                    }
                },

                async updateRole(user, newRole) {
                    if(!newRole || !confirm(`Mudar acesso para ${newRole.toUpperCase()}?`)) return;
                    
                    const { error } = await window.supabaseClient.from('profiles').update({ role: newRole }).eq('id', user.realId);
                    if(error) alert("Erro: " + error.message);
                    else { alert("Atualizado!"); await this.loadTeam(); }
                },

                copyCode() {
                    navigator.clipboard.writeText(this.inviteCode);
                    alert("Código copiado!");
                }
            }))
        });
    </script>
</body>
</html>
