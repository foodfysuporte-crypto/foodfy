<!DOCTYPE html>
<html lang="pt-br" class="h-full bg-slate-950 font-sans antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Foodfy Modern | Garçom</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="h-full flex flex-col bg-slate-950 text-white" x-data="waiterPage" x-init="init()">
    
    <!-- Topbar Mobile -->
    <header class="p-5 border-b border-slate-800 flex justify-between items-center bg-slate-900/80 backdrop-blur-md sticky top-0 z-50">
        <div>
            <h1 class="text-xl font-black italic bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-400">Atendimento</h1>
            <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest mt-0.5">Garçom Mode</p>
        </div>
        <button @click="window.auth.signOut()" class="w-10 h-10 bg-slate-800 rounded-full flex items-center justify-center border border-slate-700">
            🚪
        </button>
    </header>

    <main class="flex-1 overflow-y-auto w-full p-4 space-y-6">
        
        <div class="flex items-center space-x-3 bg-slate-900 border border-slate-800 rounded-2xl p-4">
            <div class="w-12 h-12 bg-blue-500/20 text-blue-400 rounded-xl flex items-center justify-center text-xl">🍽️</div>
            <div class="flex-1">
                <input type="text" x-model="searchTable" placeholder="Buscar Mesa Ativa..." class="w-full bg-transparent border-none text-white font-bold outline-none placeholder-slate-600">
            </div>
        </div>

        <div>
            <div class="flex justify-between items-end mb-4 px-1">
                <h2 class="text-xs font-black text-slate-500 uppercase tracking-widest">Mesas Abertas</h2>
                <button @click="openNewModal" class="text-blue-400 text-xs font-bold uppercase tracking-widest hover:text-white transition-colors">+ Nova</button>
            </div>

            <div class="space-y-3">
                <template x-for="t in filteredTables" :key="t.id">
                    <button @click="openTable(t)" class="w-full bg-slate-900 border border-slate-800 p-5 rounded-3xl flex items-center justify-between hover:bg-slate-800 transition-all text-left">
                        <div class="flex items-center space-x-4">
                            <div class="w-12 h-12 rounded-full bg-slate-950 border border-slate-800 flex items-center justify-center font-black text-white shadow-inner">
                                <span x-text="t.name.replace('Mesa ', '')"></span>
                            </div>
                            <div>
                                <h3 class="font-bold text-lg text-white" x-text="t.name"></h3>
                                <p class="text-xs text-slate-500 font-bold mt-0.5"><span x-text="t.itemCount"></span> Itens Lançados</p>
                            </div>
                        </div>
                        <div class="text-blue-400 font-black text-lg">
                            <span x-text="formatMoney(t.total)"></span>
                        </div>
                    </button>
                </template>
                
                <div x-show="filteredTables.length === 0" class="text-center py-10" x-cloak>
                    <p class="text-slate-600 font-bold text-sm uppercase tracking-widest mb-1 mt-6">Nenhuma Mesa Status</p>
                    <p class="text-slate-700 text-xs font-semibold">Crie uma nova ou modifique sua busca.</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal para Lançar Novo Pedido na Mesa -->
    <div x-show="showMenuModal" x-transition class="fixed inset-0 z-50 flex flex-col bg-slate-950" x-cloak>
        <header class="p-5 border-b border-slate-800 flex justify-between items-center bg-slate-900">
            <div>
                <h2 class="text-lg font-black text-white" x-text="'Mesa ' + currentTable"></h2>
                <p class="text-xs text-blue-400 font-bold uppercase tracking-widest">Lançamento de Itens</p>
            </div>
            <button @click="closeMenuModal" class="bg-slate-800 text-slate-400 font-black px-4 py-2 rounded-xl text-xs uppercase">Voltar</button>
        </header>

        <!-- Categories -->
        <div class="px-4 py-3 bg-slate-950/50 border-b border-slate-800 overflow-x-auto hide-scrollbar flex space-x-2 items-center">
            <button @click="selectedCat = null" :class="!selectedCat ? 'bg-white text-black' : 'bg-slate-900 text-slate-400'" class="px-4 py-2 rounded-xl text-xs font-bold whitespace-nowrap transition-colors">Todas</button>
            <template x-for="cat in categories" :key="cat.id">
                <button @click="selectedCat = cat.id" :class="selectedCat === cat.id ? 'bg-white text-black' : 'bg-slate-900 text-slate-400'" class="px-4 py-2 rounded-xl text-xs font-bold whitespace-nowrap transition-colors" x-text="cat.name"></button>
            </template>
        </div>
        
        <!-- Products Grid -->
        <div class="flex-1 overflow-y-auto p-4 grid grid-cols-2 gap-3">
            <template x-for="p in filteredProducts" :key="p.id">
                <button @click="addItem(p)" class="relative text-left bg-slate-900 rounded-2xl overflow-hidden border border-slate-800 hover:border-blue-500 focus:outline-none flex flex-col h-full transition-all active:scale-95">
                    <div class="h-24 bg-slate-800 relative w-full flex items-center justify-center shrink-0">
                        <span class="text-[10px] font-black text-slate-600 uppercase" x-show="!p.image_url">Sem Foto</span>
                        <img x-show="p.image_url" :src="p.image_url" class="absolute inset-0 w-full h-full object-cover">
                    </div>
                    <div class="p-3">
                        <h3 class="font-bold text-xs text-white line-clamp-2" x-text="p.name"></h3>
                        <p class="text-blue-400 font-black mt-1 text-sm" x-text="formatMoney(p.price)"></p>
                    </div>
                    <!-- Badge Quantidade -->
                    <div x-show="getItemQty(p.id) > 0" class="absolute top-2 right-2 w-6 h-6 bg-blue-600 rounded-full flex items-center justify-center text-xs font-black text-white shadow-lg border border-slate-900" x-text="getItemQty(p.id)"></div>
                </button>
            </template>
        </div>
        
        <!-- Footer / Cart -->
        <footer class="bg-slate-900 p-4 border-t border-slate-800 pb-safe">
            <div class="flex justify-between items-center mb-4 px-2">
                <span class="text-slate-400 text-xs font-bold uppercase tracking-widest">Total Sendo Lançado</span>
                <span class="text-white font-black text-2xl" x-text="formatMoney(cartTotal)"></span>
            </div>
            <div class="flex space-x-3">
                <button @click="requestAccount" x-show="cart.length === 0" class="flex-1 py-4 rounded-2xl font-black bg-slate-800 text-slate-300 uppercase tracking-widest text-xs border border-slate-700">Fechar Conta</button>
                <button @click="sendToKitchen" x-show="cart.length > 0" class="flex-1 py-4 rounded-2xl font-black bg-blue-600 text-white shadow-lg shadow-blue-500/20 uppercase tracking-widest text-sm transition-all flex items-center justify-center space-x-2" :disabled="isProcessing">
                    <span x-text="isProcessing ? 'Enviando...' : 'ENVIAR COZINHA'"></span>
                </button>
            </div>
        </footer>
    </div>

    <!-- Scripts -->
    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
    <!-- Reaproveitamos pos.js para a inteligência de lançar pedido na mesa -->
    <script src="js/pos.js"></script>
    
    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('waiterPage', () => ({
                user: null, orgId: null, searchTable: '', tables: [],
                products: [], categories: [], cart: [], showMenuModal: false,
                currentTable: '', selectedCat: null, isProcessing: false,
                
                async init() {
                    const session = await window.auth.session();
                    if (!session || session.profile.role !== 'garcom' && session.profile.role !== 'admin') return window.location.href = 'index.html';
                    this.user = session;
                    this.orgId = session.profile.org_id;

                    await this.loadActiveTables();
                    this.products = await window.pos.loadProducts() || [];
                    this.categories = await window.pos.loadCategories() || [];
                },

                async loadActiveTables() {
                    // Simulating active tables by looking up customers with recent orders.
                    // Em um app real, "Customer" com a flag mesa aberta ou um table_status.
                    // Vamos usar o customer = mesa
                    const { data } = await window.supabaseClient.from('customers').select('id, name, type').eq('org_id', this.orgId).eq('type', 'mesa');
                    
                    if(!data) return;
                    // Mock counts
                    this.tables = data.map(t => ({
                        id: t.id, name: t.name, itemCount: Math.floor(Math.random() * 5) + 1, total: Math.random() * 100
                    }));
                },

                get filteredTables() {
                    return this.tables.filter(t => t.name.toLowerCase().includes(this.searchTable.toLowerCase()));
                },
                get filteredProducts() {
                    return this.products.filter(p => this.selectedCat ? p.category_id === this.selectedCat : true);
                },

                openNewModal() {
                    const mesa = prompt('Digite o NÚMERO da Nova Mesa (Ex: 05):');
                    if(mesa) this.openTable({ name: `Mesa ${mesa}`.replace('Mesa Mesa', 'Mesa') });
                },

                openTable(t) {
                    this.currentTable = t.name.replace('Mesa ', '');
                    this.cart = [];
                    this.showMenuModal = true;
                },
                closeMenuModal() { this.showMenuModal = false; this.cart = []; },

                addItem(p) {
                    const idx = this.cart.findIndex(i => i.id === p.id);
                    if(idx > -1) this.cart[idx].quantity++;
                    else this.cart.push({ ...p, quantity: 1 });
                },
                getItemQty(id) {
                    const item = this.cart.find(i => i.id === id);
                    return item ? item.quantity : 0;
                },
                get cartTotal() { return this.cart.reduce((s,i) => s + (i.price * i.quantity), 0); },

                async sendToKitchen() {
                    this.isProcessing = true;
                    try {
                        await window.pos.placeOrder(this.cart, 'mesa', this.currentTable);
                        alert(`Itens lançados na Mesa ${this.currentTable}!`);
                        this.closeMenuModal();
                        await this.loadActiveTables();
                    } catch(e) {
                        alert("Erro ao lançar: " + e.message);
                    } finally {
                        this.isProcessing = false;
                    }
                },
                
                requestAccount() {
                    alert(`O Caixa foi avisado para fechar a Mesa ${this.currentTable}!`);
                    this.closeMenuModal();
                },

                formatMoney(val) { return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(val); }
            }))
        });
    </script>
</body>
</html>
