<!DOCTYPE html><html lang='pt-br' class='h-full bg-slate-950 font-sans'><head><meta charset='UTF-8'><title>Foodfy Modern | Login</title><script src='https://cdn.tailwindcss.com'></script><script defer src='https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js'></script><script src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js'></script></head><body class='h-full flex items-center justify-center bg-slate-950 text-white' x-data='loginPage'><div class='max-w-md w-full p-10 bg-slate-900 rounded-3xl border border-slate-800 shadow-2xl space-y-8'><div class='text-center'><h1 class='text-4xl font-black bg-gradient-to-r from-purple-500 to-pink-500 bg-clip-text text-transparent italic'>Foodfy Modern</h1><p class='text-slate-500 text-xs uppercase tracking-[0.3em] font-bold mt-2'>Acesso Restrito</p></div><form @submit.prevent='login' class='space-y-4'><input type='email' x-model='email' required class='w-full bg-slate-800 border-none rounded-2xl p-4 text-white focus:ring-2 focus:ring-purple-500 outline-none' placeholder='E-mail'><input type='password' x-model='password' required class='w-full bg-slate-800 border-none rounded-2xl p-4 text-white focus:ring-2 focus:ring-purple-500 outline-none' placeholder='Senha'><div x-show='error' class='text-red-400 text-xs bg-red-500/10 p-3 rounded-xl' x-text='error'></div><button type='submit' :disabled='loading' class='w-full py-4 bg-purple-600 hover:bg-purple-700 rounded-2xl font-black text-sm transition-all' x-text='loading ? "Entrando..." : "ENTRAR"'></button></form></div><script src='js/app.js'></script><script src='js/auth.js'></script><script>document.addEventListener('alpine:init', () => { Alpine.data('loginPage', () => ({ email: '', password: '', error: '', loading: false, async login() { this.loading = true; this.error = ''; try { await window.auth.signIn(this.email, this.password); } catch (e) { this.error = e.message || JSON.stringify(e); } finally { this.loading = false; } } })) });</script></body></html>
