<!DOCTYPE html>
<html lang="pt-br" class="h-full bg-slate-950 font-sans">
<head>
    <meta charset="UTF-8">
    <title>Foodfy Modern | Proprietário</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>
<body class="h-full flex items-center justify-center bg-slate-950 text-white" x-data="loginPage">
    <div class="max-w-md w-full p-10 bg-slate-900 rounded-3xl border border-slate-800 shadow-2xl space-y-8 relative overflow-hidden">
        
        <!-- Header -->
        <div class="text-center relative z-10">
            <h1 class="text-4xl font-black bg-gradient-to-r from-purple-500 to-pink-500 bg-clip-text text-transparent italic">Foodfy Modern</h1>
            <p class="text-slate-500 text-xs uppercase tracking-[0.3em] font-bold mt-2">Dono do Restaurante</p>
        </div>

        <!-- Formulário Admin -->
        <form @submit.prevent="submitForm" class="space-y-4 relative z-10">
            <input type="email" x-model="email" required class="w-full bg-slate-800 border-none rounded-2xl p-4 text-white focus:ring-2 focus:ring-purple-500 outline-none transition-all placeholder-slate-500" placeholder="E-mail">
            <input type="password" x-model="password" required class="w-full bg-slate-800 border-none rounded-2xl p-4 text-white focus:ring-2 focus:ring-purple-500 outline-none transition-all placeholder-slate-500" placeholder="Senha">
            
            <div x-show="error" class="text-red-400 text-xs bg-red-500/10 p-3 rounded-xl border border-red-500/20" x-text="error" x-transition></div>
            
            <button type="submit" :disabled="loading" class="w-full py-4 bg-purple-600 hover:bg-purple-500 disabled:opacity-50 rounded-2xl font-black text-sm transition-all shadow-lg shadow-purple-500/20 mt-4" x-text="loading ? 'ENTRANDO...' : 'ENTRAR NO PAINEL'"></button>
        </form>

        <div class="text-center relative z-10 pt-4 border-t border-slate-800">
            <p class="text-slate-500 text-xs font-bold">A equipe tem uma tela separada de vocês.</p>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('loginPage', () => ({
                email: '', password: '', error: '', loading: false,
                async submitForm() {
                    this.loading = true; this.error = '';
                    try {
                        await window.auth.signIn(this.email, this.password);
                    } catch (e) {
                        this.error = e.message || 'Erro de conexão.';
                    } finally {
                        this.loading = false;
                    }
                }
            }))
        });
    </script>
</body>
</html>
