<!DOCTYPE html>
<html lang="pt-br" class="h-full bg-slate-950 font-sans">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foodfy Modern | Cardápio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <style>[x-cloak] { display: none !important; }</style>
</head>
<body class="h-full flex text-white bg-slate-950" x-data="productsPage" x-init="init()">
    
    <!-- Sidebar (Reaproveitada do dono) -->
    <aside class="w-20 md:w-64 bg-slate-900 border-r border-slate-800 flex flex-col items-center md:items-start py-8 space-y-8 z-10 transition-all shrink-0">
        <div class="px-0 md:px-8 flex items-center justify-center md:justify-start w-full">
            <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-purple-600 to-pink-600 flex items-center justify-center font-black italic text-xl shadow-lg">F</div>
            <span class="ml-4 font-black text-xl hidden md:block tracking-widest bg-clip-text text-transparent bg-gradient-to-r from-purple-400 to-pink-400">Foodfy</span>
        </div>
        <nav class="flex-1 w-full px-4 space-y-2">
            <a href="dashboard.html" class="flex items-center px-4 py-3 rounded-xl hover:bg-slate-800 text-slate-400 font-bold transition-all group">
                <span class="text-xl">📊</span><span class="ml-4 hidden md:block group-hover:text-white">Dashboard</span>
            </a>
            <a href="products.html" class="flex items-center px-4 py-3 rounded-xl bg-purple-600/10 text-purple-400 font-bold transition-all border border-purple-500/20">
                <span class="text-xl">🍔</span><span class="ml-4 hidden md:block text-white">Cardápio</span>
            </a>
            <a href="team.html" class="flex items-center px-4 py-3 rounded-xl hover:bg-slate-800 text-slate-400 font-bold transition-all group">
                <span class="text-xl">👥</span><span class="ml-4 hidden md:block group-hover:text-white">Equipe</span>
            </a>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col h-full overflow-hidden">
        <header class="p-8 border-b border-slate-800 flex flex-col sm:flex-row justify-between items-start sm:items-center bg-slate-900/30">
            <div>
                <h1 class="text-3xl font-black italic text-white flex items-center gap-3">Gestão de Cardápio</h1>
                <p class="text-slate-500 font-bold text-sm mt-1 uppercase tracking-widest">Crie categorias e pratos incríveis</p>
            </div>
            <div class="mt-4 sm:mt-0 flex gap-4">
                <button @click="openModal()" class="px-6 py-3 bg-purple-600 hover:bg-purple-500 text-white font-black rounded-xl transition-all shadow-lg shadow-purple-500/20 active:scale-95 flex items-center gap-2">
                    <span class="text-xl leading-none mt-[-2px]">+</span> Novo Produto
                </button>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-4 sm:p-8">
            <div class="max-w-7xl mx-auto">
                
                <!-- Status de Carregamento -->
                <div x-show="isLoading" class="flex flex-col items-center justify-center py-20" x-cloak>
                    <div class="w-12 h-12 border-4 border-slate-800 border-t-purple-500 rounded-full animate-spin"></div>
                    <p class="mt-4 text-slate-400 font-bold uppercase tracking-widest text-xs">Carregando Banco de Dados</p>
                </div>

                <!-- Grid de Produtos Premium -->
                <div x-show="!isLoading" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6" x-cloak>
                    <template x-for="p in products" :key="p.id">
                        <div class="bg-slate-900 rounded-3xl overflow-hidden border border-slate-800 shadow-xl group hover:border-purple-500/50 transition-all flex flex-col h-full relative cursor-default">
                            <!-- Foto -->
                            <div class="h-48 bg-slate-950 relative w-full flex items-center justify-center overflow-hidden shrink-0 border-b border-slate-800">
                                <span class="text-xs font-black text-slate-700 uppercase tracking-widest z-0" x-show="!p.image_url">Sem Foto</span>
                                <img x-show="p.image_url" :src="p.image_url" class="absolute inset-0 w-full h-full object-cover group-hover:scale-105 transition-transform duration-500 z-10">
                                <div class="absolute inset-0 bg-gradient-to-t from-slate-900 via-transparent to-transparent z-20"></div>
                            </div>
                            
                            <!-- Conteúdo -->
                            <div class="p-5 flex-1 flex flex-col justify-between z-30 bg-slate-900">
                                <div>
                                    <h3 class="font-black text-lg text-white mb-1 leading-tight line-clamp-2" x-text="p.name"></h3>
                                    <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest bg-slate-800 px-2 py-0.5 rounded inline-block" x-text="p.categories?.name || 'Sem Categoria'"></p>
                                </div>
                                <div class="mt-4 flex items-center justify-between">
                                    <span class="text-purple-400 font-black text-xl" x-text="formatMoney(p.price)"></span>
                                    <div class="flex gap-2">
                                        <button @click="openModal(p)" class="w-8 h-8 rounded-lg bg-slate-800 hover:bg-slate-700 flex items-center justify-center text-slate-400 hover:text-white transition-colors" title="Editar">✏️</button>
                                        <button @click="deleteProduct(p.id)" class="w-8 h-8 rounded-lg bg-slate-800 hover:bg-red-500/20 hover:border-red-500/30 border border-transparent flex items-center justify-center text-slate-400 hover:text-red-400 transition-colors" title="Excluir">🗑️</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>

                <div x-show="!isLoading && products.length === 0" class="text-center py-20 bg-slate-900/50 rounded-3xl border border-slate-800" x-cloak>
                    <div class="text-5xl opacity-50 mb-3">🍔</div>
                    <h3 class="text-lg font-black text-slate-300">Seu cardápio está vazio</h3>
                    <p class="text-slate-500 text-sm mt-1">Nenhum produto cadastrado na sua loja virtual ainda.</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal Premium de Criação/Edição -->
    <div x-show="showModal" class="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4 bg-slate-950/80 backdrop-blur-sm" x-transition x-cloak>
        <div @click.outside="closeModal" class="bg-slate-900 border border-slate-800 w-full max-w-xl rounded-t-[2.5rem] sm:rounded-3xl shadow-2xl flex flex-col max-h-[90vh] overflow-hidden transform transition-all">
            
            <header class="px-8 py-6 border-b border-slate-800 flex justify-between items-center bg-slate-900 relative z-10">
                <div>
                    <h2 class="text-xl font-black text-white" x-text="form.id ? 'Editar Produto' : 'Novo Produto'"></h2>
                    <p class="text-[10px] text-purple-400 font-bold uppercase tracking-widest mt-1">Configuração de Vendas</p>
                </div>
                <button @click="closeModal" class="w-8 h-8 bg-slate-800 rounded-full text-slate-400 hover:text-white flex items-center justify-center transition-colors">✕</button>
            </header>

            <div class="flex-1 overflow-y-auto px-8 py-6 custom-scrollbar bg-slate-950/50">
                <form id="productForm" @submit.prevent="saveProduct" class="space-y-6">
                    
                    <!-- Upload de Imagem Nativo -->
                    <div class="flex flex-col items-center bg-slate-900 border-2 border-dashed border-slate-700 rounded-3xl p-6 relative group hover:border-purple-500 transition-colors cursor-pointer" @click="$refs.fileInput.click()">
                        <input type="file" x-ref="fileInput" @change="handleFile" accept="image/*" class="hidden">
                        
                        <template x-if="imagePreview || form.image_url">
                            <img :src="imagePreview || form.image_url" class="absolute inset-0 w-full h-full object-cover rounded-3xl opacity-80 group-hover:opacity-100 transition-opacity">
                        </template>
                        
                        <div class="relative z-10 flex flex-col items-center" :class="{ 'opacity-0 group-hover:opacity-100 bg-slate-900/80 p-4 rounded-xl backdrop-blur-sm transition-all': imagePreview || form.image_url }">
                            <span class="text-4xl mb-2">📸</span>
                            <span class="text-xs font-black uppercase tracking-widest text-white">Toque para Foto Premium</span>
                            <span class="text-[9px] text-slate-400 font-bold mt-1 uppercase" x-show="!imagePreview && !form.image_url">Enviará pro Supabase Space</span>
                        </div>
                    </div>

                    <!-- Campos -->
                    <div class="space-y-4">
                        <div class="flex flex-col">
                            <label class="text-[10px] uppercase tracking-widest font-black text-slate-500 mb-1 ml-2">Nome Oficial do Prato</label>
                            <input x-model="form.name" required placeholder="Ex: Mega Burger Bacon" class="w-full bg-slate-900 border border-slate-800 rounded-2xl p-4 text-white font-bold outline-none focus:border-purple-500">
                        </div>

                        <div class="flex flex-col sm:flex-row gap-4">
                            <div class="flex-1 flex flex-col">
                                <label class="text-[10px] uppercase tracking-widest font-black text-slate-500 mb-1 ml-2">Preço (R$)</label>
                                <input x-model="form.price" required type="number" step="0.01" min="0" placeholder="0.00" class="w-full bg-slate-900 border border-slate-800 rounded-2xl p-4 text-white font-black text-xl outline-none focus:border-purple-500 text-purple-400">
                            </div>
                            <div class="flex-1 flex flex-col">
                                <label class="text-[10px] uppercase tracking-widest font-black text-slate-500 mb-1 ml-2">Categoria</label>
                                <select x-model="form.category_id" required class="w-full bg-slate-900 border border-slate-800 rounded-2xl p-4 text-white font-bold outline-none focus:border-purple-500 h-full appearance-none">
                                    <option value="" disabled selected>Selecionar...</option>
                                    <template x-for="c in categories" :key="c.id">
                                        <option :value="c.id" x-text="c.name"></option>
                                    </template>
                                </select>
                            </div>
                        </div>
                    </div>
                </form>
            </div>

            <footer class="p-6 bg-slate-900 border-t border-slate-800 pb-safe">
                <div x-show="error" class="text-red-400 text-xs font-bold text-center mb-3" x-text="error"></div>
                <button form="productForm" type="submit" :disabled="isSaving" class="w-full py-4 bg-purple-600 hover:bg-purple-500 disabled:opacity-50 text-white font-black rounded-xl transition-all shadow-lg shadow-purple-600/30 uppercase tracking-widest">
                    <span x-text="isSaving ? 'SALVANDO NA NUVEM...' : 'SALVAR PRODUTO'"></span>
                </button>
            </footer>
        </div>
    </div>

    <!-- Script de Inicialização -->
    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/products.js"></script>
    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('productsPage', () => ({
                products: [], categories: [], showModal: false, isLoading: true, isSaving: false, error: '',
                form: { id: null, name: '', price: '', category_id: '', image_url: null },
                imagePreview: null, imageFile: null,

                async init() {
                    const session = await window.auth.session();
                    if(!session || session.profile.role !== 'admin') {
                        return window.location.href = 'index.html';
                    }
                    await this.loadAll();
                },

                async loadAll() {
                    this.isLoading = true;
                    try {
                        // Verifica se window.products existe, se não foi injetado pelo PWA de alguma forma bizarra, re-injetamos ou esperamos
                        this.categories = await window.products.listCategories();
                        this.products = await window.products.list();
                    } catch(e) {
                         console.error(e);
                    } finally {
                        this.isLoading = false;
                    }
                },

                openModal(product = null) {
                    if (product) {
                        this.form = { id: product.id, name: product.name, price: product.price, category_id: product.category_id, image_url: product.image_url };
                    } else {
                        this.form = { id: null, name: '', price: '', category_id: this.categories.length > 0 ? this.categories[0].id : '', image_url: null };
                    }
                    this.imagePreview = null;
                    this.imageFile = null;
                    this.error = '';
                    this.showModal = true;
                },

                closeModal() { this.showModal = false; },

                handleFile(e) {
                    const file = e.target.files[0];
                    if (!file) return;
                    if (file.size > 2 * 1024 * 1024) return this.error = "A imagem deve ter no máximo 2MB";
                    this.imageFile = file;
                    this.imagePreview = URL.createObjectURL(file);
                },

                async saveProduct() {
                    this.isSaving = true; this.error = '';
                    try {
                        await window.products.save(this.form, this.imageFile);
                        this.closeModal();
                        await this.loadAll();
                    } catch(e) {
                        this.error = "Falha ao salvar: " + e.message;
                    } finally {
                        this.isSaving = false;
                    }
                },

                async deleteProduct(id) {
                    if(!confirm("Atenção: O produto sairá do cardápio e não poderá ser lançado.")) return;
                    try {
                        await window.products.delete(id);
                        await this.loadAll();
                    } catch(e) {
                        alert("Erro ao excluir: " + e.message);
                    }
                },

                formatMoney(val) { return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(val); }
            }))
        })
    </script>
</body>
</html>
