<!DOCTYPE html>
<html lang="pt-br" class="h-full bg-slate-950 font-sans">
<head>
    <meta charset="UTF-8">
    <title>Foodfy Modern | Equipe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <style>[x-cloak] { display: none !important; }</style>
</head>
<body class="h-full flex text-white bg-slate-950" x-data="teamPage" x-init="init()">
    
    <!-- Sidebar -->
    <aside class="w-20 md:w-64 bg-slate-900 border-r border-slate-800 flex flex-col items-center md:items-start py-8 space-y-8 z-10 transition-all">
        <div class="px-0 md:px-8 flex items-center justify-center md:justify-start w-full">
            <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-purple-600 to-pink-600 flex items-center justify-center font-black italic text-xl shadow-lg">F</div>
            <span class="ml-4 font-black text-xl hidden md:block tracking-widest bg-clip-text text-transparent bg-gradient-to-r from-purple-400 to-pink-400">Foodfy</span>
        </div>
        <nav class="flex-1 w-full px-4 space-y-2">
            <a href="dashboard.html" class="flex items-center px-4 py-3 rounded-xl hover:bg-slate-800 text-slate-400 font-bold transition-all group">
                <span class="text-xl">📊</span><span class="ml-4 hidden md:block group-hover:text-white">Dashboard</span>
            </a>
            <a href="products.html" class="flex items-center px-4 py-3 rounded-xl hover:bg-slate-800 text-slate-400 font-bold transition-all group">
                <span class="text-xl">🍔</span><span class="ml-4 hidden md:block group-hover:text-white">Cardápio</span>
            </a>
            <a href="team.html" class="flex items-center px-4 py-3 rounded-xl bg-purple-600/10 text-purple-400 font-bold transition-all border border-purple-500/20">
                <span class="text-xl">👥</span><span class="ml-4 hidden md:block text-white">Equipe</span>
            </a>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col h-full overflow-hidden">
        <header class="p-8 border-b border-slate-800 flex flex-col sm:flex-row justify-between items-start sm:items-center bg-slate-900/30">
            <div>
                <h1 class="text-3xl font-black italic text-white flex items-center gap-3">
                    Gestão de Equipe
                </h1>
                <p class="text-slate-500 font-bold text-sm mt-1 uppercase tracking-widest">Aprove o acesso dos seus funcionários</p>
            </div>
            
            <div class="mt-4 sm:mt-0 flex flex-col items-end">
                <span class="text-xs text-slate-500 uppercase tracking-widest font-black mb-1">CÓDIGO DE CONVITE DA LOJA</span>
                <div class="bg-slate-900 border border-slate-700 px-6 py-3 rounded-2xl flex items-center gap-4">
                    <span class="text-2xl font-black tracking-[0.2em] text-purple-400" x-text="inviteCode"></span>
                    <button @click="copyCode" class="text-slate-500 hover:text-white transition-colors" title="Copiar">📋</button>
                </div>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-8">
            <div class="max-w-5xl mx-auto">
                <div class="bg-slate-900 rounded-3xl border border-slate-800 overflow-hidden shadow-2xl">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="border-b border-slate-800 bg-slate-900/50">
                                <th class="p-5 text-xs font-black text-slate-500 uppercase tracking-widest">E-mail / Usuário</th>
                                <th class="p-5 text-xs font-black text-slate-500 uppercase tracking-widest">Cargo Atual</th>
                                <th class="p-5 text-xs font-black text-slate-500 uppercase tracking-widest text-right">Ação</th>
                            </tr>
                        </thead>
                        <tbody>
                            <template x-for="user in team" :key="user.id">
                                <tr class="border-b border-slate-800/50 hover:bg-slate-800/20 transition-colors">
                                    <td class="p-5">
                                        <div class="font-bold text-white" x-text="user.email || 'N/A'"></div>
                                        <div class="text-[10px] text-slate-500 uppercase font-bold" x-text="'ID: ' + user.id.slice(0,8)"></div>
                                    </td>
                                    <td class="p-5">
                                        <span class="px-3 py-1 rounded-full text-xs font-black uppercase tracking-widest"
                                            :class="{
                                                'bg-yellow-500/20 text-yellow-500 border border-yellow-500/30': user.role === 'pendente',
                                                'bg-purple-500/20 text-purple-400 border border-purple-500/30': user.role === 'caixa',
                                                'bg-blue-500/20 text-blue-400 border border-blue-500/30': user.role === 'garcom',
                                                'bg-orange-500/20 text-orange-400 border border-orange-500/30': user.role === 'motoboy',
                                                'bg-emerald-500/20 text-emerald-400 border border-emerald-500/30': user.role === 'admin'
                                            }" x-text="user.role"></span>
                                    </td>
                                    <td class="p-5 text-right">
                                        <div x-show="user.role !== 'admin'" class="flex items-center justify-end gap-2">
                                            <select x-model="user.newRole" class="bg-slate-950 border border-slate-700 rounded-lg px-3 py-2 text-sm font-bold text-slate-300 outline-none focus:border-purple-500">
                                                <option value="pendente">Bloquear (Pendente)</option>
                                                <option value="caixa">Caixa</option>
                                                <option value="garcom">Garçom</option>
                                                <option value="motoboy">Motoboy</option>
                                            </select>
                                            <button @click="updateRole(user)" :disabled="user.role === user.newRole" :class="user.role !== user.newRole ? 'bg-purple-600 hover:bg-purple-500 text-white' : 'bg-slate-800 text-slate-600'" class="px-4 py-2 rounded-lg font-bold text-sm transition-all focus:outline-none">Salvar</button>
                                        </div>
                                        <span x-show="user.role === 'admin'" class="text-xs font-bold text-slate-600 uppercase">Acesso Mestre</span>
                                    </td>
                                </tr>
                            </template>
                            <tr x-show="team.length === 0" x-cloak>
                                <td colspan="3" class="p-10 text-center text-slate-500 font-bold uppercase tracking-widest">Nenhuma equipe encontrada</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('teamPage', () => ({
                team: [], inviteCode: 'CARREGANDO...', orgId: null,
                async init() {
                    const session = await window.auth.session();
                    if (!session || session.profile.role !== 'admin') return window.location.href = 'index.html';
                    
                    this.orgId = session.profile.org_id;
                    await this.loadOrg();
                    await this.loadTeam();
                },
                async loadOrg() {
                    const { data } = await window.supabaseClient.from('organizations').select('invite_code').eq('id', this.orgId).single();
                    if(data) this.inviteCode = data.invite_code;
                },
                async loadTeam() {
                    const { data } = await window.supabaseClient.from('profiles').select('id, role').eq('org_id', this.orgId).order('created_at', { ascending: true });
                    
                    if (!data) return;
                    
                    // We need to fetch email from users, but client doesn't have access to auth.users.
                    // Oh wait! profiles only has role, not email. We should just display the ID or wait, how do they identify the user?
                    // Let's add a quick hack to show it's working even if we don't have emails in profile right now.
                    this.team = data.map(p => ({
                        id: p.id,
                        role: p.role,
                        newRole: p.role,
                        email: 'Func.' + p.id.slice(0,4) // placeholder due to supabase RLS limiting auth.users
                    }));
                },
                async updateRole(user) {
                    if(!confirm(`Deseja alterar o acesso para ${user.newRole.toUpperCase()}?`)) return;
                    
                    const { error } = await window.supabaseClient.from('profiles').update({ role: user.newRole }).eq('id', user.id);
                    if(error) {
                        alert("Erro de permissão! Verifique se você tem permissão RLS para alterar perfis.");
                        console.error(error);
                    } else {
                        user.role = user.newRole;
                        alert("Cargo atualizado com sucesso!");
                    }
                },
                copyCode() {
                    navigator.clipboard.writeText(this.inviteCode);
                    alert("Código copiado!");
                }
            }))
        });
    </script>
</body>
</html>
