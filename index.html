<!DOCTYPE html>
<html lang="pt-br" class="h-full bg-slate-950 font-sans">
<head>
    <meta charset="UTF-8">
    <title>Foodfy Modern | Acesso</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>
<body class="h-full flex items-center justify-center bg-slate-950 text-white" x-data="loginPage">
    <div class="max-w-md w-full p-10 bg-slate-900 rounded-3xl border border-slate-800 shadow-2xl space-y-8 relative overflow-hidden">
        
        <!-- Header -->
        <div class="text-center relative z-10">
            <h1 class="text-4xl font-black bg-gradient-to-r from-purple-500 to-pink-500 bg-clip-text text-transparent italic">Foodfy Modern</h1>
            <p class="text-slate-500 text-xs uppercase tracking-[0.3em] font-bold mt-2" x-text="mode === 'login' ? 'Acesso Restrito' : 'Cadastro de Equipe'"></p>
        </div>

        <!-- Formulário -->
        <form @submit.prevent="submitForm" class="space-y-4 relative z-10">
            
            <input type="email" x-model="email" required class="w-full bg-slate-800 border-none rounded-2xl p-4 text-white focus:ring-2 focus:ring-purple-500 outline-none transition-all placeholder-slate-500" placeholder="E-mail">
            
            <input type="password" x-model="password" required class="w-full bg-slate-800 border-none rounded-2xl p-4 text-white focus:ring-2 focus:ring-purple-500 outline-none transition-all placeholder-slate-500" placeholder="Senha">
            
            <div x-show="mode === 'register'" x-transition class="pt-2">
                <label class="text-[10px] text-slate-400 font-bold uppercase tracking-widest ml-2 mb-1 block">Código Fornecido Pelo Dono</label>
                <input type="text" x-model="inviteCode" :required="mode === 'register'" class="w-full bg-slate-950 border border-slate-800 rounded-2xl p-4 text-white focus:ring-2 focus:ring-purple-500 outline-none font-bold text-center uppercase tracking-widest placeholder-slate-700" placeholder="Ex: FD-1A2B3">
            </div>

            <div x-show="error" class="text-red-400 text-xs bg-red-500/10 p-3 rounded-xl border border-red-500/20" x-text="error" x-transition></div>
            
            <button type="submit" :disabled="loading" class="w-full py-4 bg-purple-600 hover:bg-purple-500 disabled:opacity-50 rounded-2xl font-black text-sm transition-all shadow-lg shadow-purple-500/20 mt-4" x-text="btnText"></button>
        </form>

        <!-- Toggle Mode -->
        <div class="text-center relative z-10 pt-4 border-t border-slate-800">
            <button type="button" @click="toggleMode" class="text-slate-400 text-xs font-bold hover:text-white transition-colors" x-text="mode === 'login' ? 'Sou funcionário e tenho um Código de Vínculo' : 'Voltar para o Login Normal'"></button>
        </div>

    </div>

    <!-- Scripts -->
    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('loginPage', () => ({
                mode: 'login', email: '', password: '', inviteCode: '', error: '', loading: false,
                
                get btnText() {
                    if(this.loading) return 'PROCESSANDO...';
                    return this.mode === 'login' ? 'ENTRAR' : 'VINCULAR CADASTRO';
                },

                toggleMode() {
                    this.mode = this.mode === 'login' ? 'register' : 'login';
                    this.error = '';
                },

                async submitForm() {
                    this.loading = true;
                    this.error = '';
                    try {
                        if (this.mode === 'login') {
                            await window.auth.signIn(this.email, this.password);
                        } else {
                            await window.auth.signUpStaff(this.email, this.password, this.inviteCode);
                        }
                    } catch (e) {
                        this.error = e.message || 'Erro de conexão.';
                    } finally {
                        this.loading = false;
                    }
                }
            }))
        });
    </script>
</body>
</html>
